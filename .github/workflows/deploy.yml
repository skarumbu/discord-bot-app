name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  deploy:
    name: Build, Push, Deploy
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for OIDC login to Azure
      contents: read
    env:
      ACR_NAME: discordbotprodacr
      ACR_LOGIN_SERVER: discordbotprodacr.azurecr.io
      IMAGE_NAME: discord-bot

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image to ACR
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          IMAGE_TAG=sha-$SHORT_SHA
          az acr login --name $ACR_NAME
          docker build \
            -t $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG \
            -t $ACR_LOGIN_SERVER/$IMAGE_NAME:latest \
            .
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:latest
          echo "FULL_IMAGE=$ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: skarumbu/discord-bot-infra
          path: infra
          token: ${{ secrets.INFRA_REPO_PAT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: infra/environments/prod
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: terraform init

      - name: Terraform apply
        working-directory: infra/environments/prod
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_secret_env_vars: ${{ secrets.TF_VAR_SECRET_ENV_VARS }}
        run: terraform apply -auto-approve -var="image=${{ env.FULL_IMAGE }}"
